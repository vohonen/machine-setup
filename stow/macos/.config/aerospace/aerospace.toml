start-at-login = true

# Tell sketchybar which workspace is focused (it draws the workspace overview)
exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.right = 0
# Reserve room for sketchybar: the built-in display hosts it in the notch strip
# (macOS keeps windows out of there), external monitors need an explicit gap.
outer.top = [{ monitor.'built-in' = 0 }, 28]
outer.bottom = 0

[mode.main.binding]
# Launchers (also act as "jump to that app's workspace")
alt-t = 'exec-and-forget open -a Alacritty'
alt-b = 'exec-and-forget open -a Firefox'
alt-s = 'exec-and-forget open -a Slack'
alt-e = 'exec-and-forget open -a Mail'
alt-c = 'exec-and-forget open -a Calendar'
alt-m = 'exec-and-forget open -a Spotify'

# Focus / move within a workspace
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
# Workspaces 8 & 9 intentionally unbound: on the Finnish layout ⌥8/⌥9 = [ ] and
# ⇧⌥8/⇧⌥9 = { }, so binding them would hog all four bracket characters.
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-tab = 'workspace-back-and-forth'

# Move the whole current workspace to another monitor
alt-shift-period = 'move-workspace-to-monitor --wrap-around next'
alt-shift-comma  = 'move-workspace-to-monitor --wrap-around prev'

# Layout + resize (Finnish-safe mnemonics)
alt-v = 'layout tiles horizontal vertical'      # Vary split orientation
alt-a = 'layout accordion horizontal vertical'  # Accordion
alt-f = 'fullscreen'
alt-shift-space = 'layout floating tiling'
alt-comma  = 'resize smart -50'   # < smaller
alt-period = 'resize smart +50'   # > bigger
# balance-sizes moved to service mode ('b'): ⌥0 now types { on the Finnish TeX layout,
# so AeroSpace must not bind alt-0 or it would swallow the keystroke.

# Help-menu search: fuzzy-find any menu item of the focused app. Clicking the real
# Help menu (vs the "Show Help menu" system hotkey) reveals the auto-hidden menu bar
# reliably; falls back to menu-bar focus for apps without a Help menu (Alacritty).
ctrl-alt-h = 'exec-and-forget ~/.config/aerospace/help-menu.sh'

# Service mode entry
alt-shift-s = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']     # reset messy layout
b = ['balance-sizes', 'mode main']              # balance split sizes (was alt-0)
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
h = ['join-with left', 'mode main']
j = ['join-with down', 'mode main']
k = ['join-with up', 'mode main']
l = ['join-with right', 'mode main']

# Float transient system windows
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

# Pin apps to home workspaces (makes launcher keys double as navigation)
[[on-window-detected]]
if.app-id = 'org.alacritty'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.apple.iCal'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 5'
